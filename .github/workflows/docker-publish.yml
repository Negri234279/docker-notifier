name: Docker publish

on:
  push:
    branches: [main, master]

# A new push supersedes any in-flight build for the same ref.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE: negrii/docker-notifier

jobs:
  # Gate: only build & publish when package.json "version" actually changed
  # in this push. Other pushes still get type-checked (verify) but produce
  # no image — bump the version in package.json to cut a release.
  gate:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history to read package.json at the previous commit

      - name: Compare versions
        id: check
        run: |
          CURRENT=$(jq -r .version package.json)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

          BEFORE='${{ github.event.before }}'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "::notice::No previous commit on this ref — treating as a release ($CURRENT)."
              echo "publish=true" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          PREV=$(git show "$BEFORE:package.json" 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "Previous version: '${PREV:-<unknown>}'  ·  Current version: '$CURRENT'"

          if [ "$PREV" != "$CURRENT" ]; then
              echo "::notice::Version changed ${PREV:-<unknown>} → $CURRENT — building & publishing."
              echo "publish=true" >> "$GITHUB_OUTPUT"
          else
              echo "::notice::package.json version unchanged ($CURRENT) — skipping Docker build/publish."
              echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  # Type-check (and verify formatting) on every push, regardless of release.
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx astro check

  # Build each platform on its native runner — no QEMU. Each job pushes
  # a per-platform image by digest; the merge job stitches them into a
  # single multi-arch manifest under the version + latest tags.
  build:
    name: Build ${{ matrix.platform }}
    needs: [gate, verify]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}
          build-args: |
            VERSION=${{ needs.gate.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests
    needs: [gate, build]
    if: needs.gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=Docker notifier
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          readme-filepath: ./README.md
